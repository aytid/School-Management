    <style>
        /* Page-specific styles */
        .filter-card {
            background: var(--white);
            border-radius: var(--r-lg);
            border: 1px solid var(--gray-200);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .stats-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .stat-pill {
            background: var(--white);
            border: 1px solid var(--gray-200);
            padding: 0.875rem 1.25rem;
            border-radius: var(--r-lg);
            text-align: center;
            min-width: 110px;
            box-shadow: var(--shadow-xs);
        }

        .stat-pill .sp-val {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--gray-900);
        }

        .stat-pill .sp-label {
            font-size: 0.75rem;
            color: var(--gray-500);
            margin-top: 0.1rem;
        }

        .marks-table-card {
            background: var(--white);
            border-radius: var(--r-lg);
            border: 1px solid var(--gray-200);
            overflow: hidden;
        }

        .marks-table-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--gray-100);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .marks-table-header h3 {
            font-size: 0.9375rem;
            font-weight: 700;
            color: var(--gray-900);
        }

        .table-actions {
            display: flex;
            gap: 0.5rem;
        }

        .marks-input {
            width: 80px;
            padding: 0.5rem;
            border: 1.5px solid var(--gray-300);
            border-radius: var(--r);
            text-align: center;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .marks-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
        }

        .marks-input.valid {
            border-color: var(--emerald-500);
            background: var(--emerald-50);
        }

        .marks-input.invalid {
            border-color: var(--rose-500);
            background: var(--rose-50);
        }

        .grade-tag {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.625rem;
            border-radius: var(--r-full);
            font-size: 0.75rem;
            font-weight: 700;
        }

        .grade-ap {
            background: var(--emerald-100);
            color: #065f46;
        }

        .grade-a {
            background: #dbeafe;
            color: #1e40af;
        }

        .grade-b {
            background: var(--amber-100);
            color: #92400e;
        }

        .grade-c {
            background: #fed7aa;
            color: #9a3412;
        }

        .grade-d {
            background: var(--rose-100);
            color: #991b1b;
        }

        .grade-f {
            background: #fecaca;
            color: #7f1d1d;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--gray-400);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            opacity: 0.35;
        }

        @media (max-width: 768px) {
            .filter-grid {
                grid-template-columns: 1fr;
            }

            .marks-table-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* Sidebar open state for mobile */
        .sidebar.open {
            transform: translateX(0);
            box-shadow: var(--shadow-lg);
        }

        .sidebar-overlay.active {
            display: block;
            opacity: 1;
            pointer-events: auto;
        }

        /* Mobile profile section */
        .sidebar-profile-mobile {
            display: none;
        }

        @media (max-width: 1024px) {
            .sidebar-profile-mobile {
                display: flex;
            }

            .sidebar-user {
                display: none !important;
            }
        }

        @media (min-width: 1025px) {
            .sidebar-profile-mobile {
                display: none !important;
            }

            .sidebar-user {
                display: flex !important;
            }
        }
    </style>
</head>

    <script>
        /* ── Sidebar toggle ── */
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('sidebarOverlay');
            const btn = document.getElementById('hamburgerBtn');
            sb.classList.toggle('open');
            ov.classList.toggle('active');
            btn.classList.toggle('active');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
            document.getElementById('hamburgerBtn').classList.remove('active');
        }

        /* ── Session guard ── */
        const teacher = JSON.parse(localStorage.getItem("school_session"));
        if (!teacher) window.location.href = 'index.html';

        /* ── Populate user info ── */
        const initials = teacher?.name?.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase() || 'T';

        // Desktop sidebar avatar
        const sidebarAvatar = document.getElementById('sidebarAvatar');
        if (sidebarAvatar) {
            if (teacher?.image_url) {
                sidebarAvatar.innerHTML = `<img src="${teacher.image_url}" alt="${teacher.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
            } else {
                sidebarAvatar.textContent = initials;
            }
        }

        // Mobile profile avatar
        const sidebarProfileAvatar = document.getElementById('sidebarProfileAvatar');
        if (sidebarProfileAvatar) {
            if (teacher?.image_url) {
                sidebarProfileAvatar.innerHTML = `<img src="${teacher.image_url}" alt="${teacher.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
            } else {
                sidebarProfileAvatar.textContent = initials;
            }
        }

        // Names
        const sidebarName = document.getElementById('sidebarName');
        if (sidebarName) sidebarName.textContent = teacher.name || 'Teacher';

        const sidebarRole = document.getElementById('sidebarRole');
        if (sidebarRole) sidebarRole.textContent = teacher.designation || 'Teacher';

        const sidebarProfileName = document.getElementById('sidebarProfileName');
        if (sidebarProfileName) sidebarProfileName.textContent = teacher?.name?.split(' ')[0] || 'Teacher';

        /* ── Marks functionality ── */
        let studentsList = [];
        let subjectIdMap = {};
        let currentMaxMarks = 20;

        function getExamMaxMarks(examType) {
            if (examType?.startsWith('SA')) return 80;
            if (examType?.startsWith('FA')) return 20;
            return 20;
        }

        document.getElementById('examSelect').addEventListener('change', function () {
            const examType = this.value;
            currentMaxMarks = getExamMaxMarks(examType);
            document.getElementById('maxMarksDisplay').textContent = currentMaxMarks;
        });

        function onClassChange() {
            const cls = document.getElementById('classSelect').value;
            const subSel = document.getElementById('subjectSelect');
            const subjects = cls ? SUBJECTS_BY_CLASS[cls] : [];
            subSel.innerHTML = '<option value="">Select Subject</option>' +
                subjects.map(s => `<option value="${s}">${s}</option>`).join('');
        }

        async function loadSubjectIds() {
            const { data } = await db.from('subjects').select('*');
            if (data) data.forEach(s => { subjectIdMap[s.subject_name] = s.id; });
        }

        async function loadStudents() {
            const cls = document.getElementById('classSelect').value;
            const sec = document.getElementById('sectionSelect').value;
            const subj = document.getElementById('subjectSelect').value;
            const exam = document.getElementById('examSelect').value;

            if (!cls || !sec || !subj || !exam) {
                showToast('Please select all fields', 'error');
                return;
            }

            const subjectId = subjectIdMap[subj];
            if (!subjectId) {
                showToast('Subject not found', 'error');
                return;
            }

            const { data: students, error } = await db.from('students')
                .select('*').eq('class_name', cls).eq('section', sec).order('roll_number');

            if (error) { showToast('Error: ' + error.message, 'error'); return; }
            studentsList = students || [];

            const { data: existingMarks } = await db.from('marks')
                .select('*').eq('subject_id', subjectId).eq('exam_type', exam)
                .in('student_id', studentsList.map(s => s.id));

            const marksMap = {};
            if (existingMarks) existingMarks.forEach(m => { marksMap[m.student_id] = m; });

            renderTable(marksMap, subj, cls, sec, exam);
        }

        function renderTable(marksMap, subj, cls, sec, exam) {
            document.getElementById('tableTitle').textContent = `Class ${cls}-${sec} | ${subj} | ${exam}`;
            document.getElementById('maxMarksDisplay').textContent = currentMaxMarks;

            if (studentsList.length === 0) {
                document.getElementById('marksTableBody').innerHTML = '<tr><td colspan="6" class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg><p>No students found</p></td></tr>';
                document.getElementById('marksSection').style.display = 'block';
                document.getElementById('statsRow').style.display = 'flex';
                updateStats();
                return;
            }

            document.getElementById('marksTableBody').innerHTML = studentsList.map((s, i) => {
                const existing = marksMap[s.id];
                const marksVal = existing ? existing.marks_obtained : '';
                const g = existing ? calculateGrade(existing.marks_obtained, currentMaxMarks) : null;
                return `<tr id="row_${s.id}">
                    <td style="color:var(--gray-400);font-weight:600">${i + 1}</td>
                    <td><span class="badge badge-gray">${s.roll_number}</span></td>
                    <td><strong>${s.name}</strong></td>
                    <td>
                        <input type="number" class="marks-input ${marksVal !== '' ? 'valid' : ''}"
                            id="marks_${s.id}" min="0" max="${currentMaxMarks}"
                            value="${marksVal}" placeholder="0–${currentMaxMarks}"
                            oninput="onMarksInput(${s.id})">
                    </td>
                    <td id="grade_${s.id}">
                        ${g ? `<span class="grade-tag ${g.cls}">${g.grade}</span>` : '–'}
                    </td>
                    <td>
                        <button class="btn btn-success btn-sm" onclick="saveSingle(${s.id})">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>
                        </button>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('marksSection').style.display = 'block';
            document.getElementById('statsRow').style.display = 'flex';
            updateStats();
        }

        function onMarksInput(studentId) {
            const inp = document.getElementById('marks_' + studentId);
            const val = parseInt(inp.value);
            const gradeCell = document.getElementById('grade_' + studentId);

            if (inp.value === '') {
                inp.className = 'marks-input';
                gradeCell.innerHTML = '–';
            } else if (isNaN(val) || val < 0 || val > currentMaxMarks) {
                inp.className = 'marks-input invalid';
                gradeCell.innerHTML = '<span style="color:var(--rose-500);font-size:0.75rem">Invalid</span>';
            } else {
                inp.className = 'marks-input valid';
                const g = calculateGrade(val, currentMaxMarks);
                gradeCell.innerHTML = `<span class="grade-tag ${g.cls}">${g.grade}</span>`;
            }
            updateStats();
        }

        function calculateGrade(marks, max) {
            const pct = (marks / max) * 100;
            if (pct >= 91) return { grade: 'A+', cls: 'grade-ap' };
            if (pct >= 81) return { grade: 'A', cls: 'grade-a' };
            if (pct >= 71) return { grade: 'B', cls: 'grade-b' };
            if (pct >= 61) return { grade: 'C', cls: 'grade-c' };
            if (pct >= 51) return { grade: 'D', cls: 'grade-d' };
            return { grade: 'F', cls: 'grade-f' };
        }

        function updateStats() {
            let entered = 0, highest = 0, lowest = currentMaxMarks, totalSum = 0;
            studentsList.forEach(s => {
                const val = document.getElementById('marks_' + s.id)?.value;
                if (val !== '' && val !== undefined) {
                    const n = parseInt(val);
                    if (!isNaN(n) && n >= 0 && n <= currentMaxMarks) {
                        entered++;
                        totalSum += n;
                        if (n > highest) highest = n;
                        if (n < lowest) lowest = n;
                    }
                }
            });
            const avg = entered > 0 ? (totalSum / entered).toFixed(1) : '–';

            document.getElementById('statsRow').innerHTML = `
                <div class="stat-pill"><div class="sp-val">${entered}/${studentsList.length}</div><div class="sp-label">Entered</div></div>
                <div class="stat-pill"><div class="sp-val">${avg}</div><div class="sp-label">Average</div></div>
                <div class="stat-pill"><div class="sp-val" style="color:var(--emerald-500)">${entered > 0 ? highest : '–'}</div><div class="sp-label">Highest</div></div>
                <div class="stat-pill"><div class="sp-val" style="color:var(--rose-500)">${entered > 0 ? lowest : '–'}</div><div class="sp-label">Lowest</div></div>
            `;
        }

        function markAllZero() {
            studentsList.forEach(s => {
                const inp = document.getElementById('marks_' + s.id);
                if (inp) { inp.value = '0'; onMarksInput(s.id); }
            });
        }

        async function saveSingle(studentId) {
            const subj = document.getElementById('subjectSelect').value;
            const exam = document.getElementById('examSelect').value;
            const inp = document.getElementById('marks_' + studentId);
            const val = parseInt(inp.value);

            if (isNaN(val) || val < 0 || val > currentMaxMarks) {
                showToast('Please enter valid marks (0–' + currentMaxMarks + ')', 'error'); return;
            }

            const subjectId = subjectIdMap[subj];
            const { data: existing } = await db.from('marks').select('id')
                .eq('student_id', studentId).eq('subject_id', subjectId).eq('exam_type', exam).single();

            let result;
            if (existing) {
                result = await db.from('marks').update({ marks_obtained: val, max_marks: currentMaxMarks }).eq('id', existing.id);
            } else {
                result = await db.from('marks').insert({ student_id: studentId, subject_id: subjectId, exam_type: exam, marks_obtained: val, max_marks: currentMaxMarks });
            }

            if (result.error) { showToast('Error: ' + result.error.message, 'error'); }
            else { showToast('Marks saved!', 'success'); }
        }

        async function saveAllMarks() {
            const subj = document.getElementById('subjectSelect').value;
            const exam = document.getElementById('examSelect').value;
            const subjectId = subjectIdMap[subj];
            const records = [];
            let hasError = false;

            studentsList.forEach(s => {
                const val = document.getElementById('marks_' + s.id)?.value;
                if (val !== '' && val !== undefined) {
                    const n = parseInt(val);
                    if (!isNaN(n) && n >= 0 && n <= currentMaxMarks) {
                        records.push({ student_id: s.id, subject_id: subjectId, exam_type: exam, marks_obtained: n, max_marks: currentMaxMarks });
                    } else { hasError = true; }
                }
            });

            if (hasError) { showToast('Some marks are invalid', 'error'); return; }
            if (records.length === 0) { showToast('No marks to save', 'error'); return; }

            await db.from('marks').delete()
                .eq('subject_id', subjectId).eq('exam_type', exam)
                .in('student_id', studentsList.map(s => s.id));

            const { error } = await db.from('marks').insert(records);
            if (error) { showToast('Error saving: ' + error.message, 'error'); }
            else { showToast(`${records.length} marks saved!`, 'success'); }
        }

        /* ── Toast ── */
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        loadSubjectIds();
    </script>
</body>

</html>
