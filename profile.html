<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profile - ZPHS Nagulapet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .profile-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        .profile-sidebar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .profile-header {
            text-align: center;
            padding: 2rem 1.5rem;
            background: linear-gradient(135deg, var(--indigo-600), var(--violet-500));
            border-radius: var(--r-xl);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .profile-avatar-large {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: white;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--indigo-600);
            position: relative;
            border: 4px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
        }

        .profile-avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-avatar-edit {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 40px;
            height: 40px;
            background: var(--emerald-500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid white;
            transition: transform 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .profile-avatar-edit:hover {
            transform: scale(1.1);
        }

        .profile-avatar-edit svg {
            width: 20px;
            height: 20px;
            color: white;
        }

        .profile-name-large {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .profile-role-large {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .info-card {
            background: var(--white);
            border-radius: var(--r-lg);
            padding: 1.5rem;
            border: 1px solid var(--gray-200);
        }

        .info-card h3 {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 1.25rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--gray-100);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 0.9375rem;
            color: var(--gray-500);
        }

        .info-value {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--gray-900);
        }

        .btn-change-password {
            width: 100%;
        }

        .upload-input {
            display: none;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .profile-layout {
                grid-template-columns: 1fr;
            }

            .profile-header {
                margin: -1rem -1rem 0 -1rem;
                border-radius: 0;
            }

            .profile-avatar-large {
                width: 120px;
                height: 120px;
            }
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <a href="profile.html" class="sidebar-profile-mobile" onclick="closeSidebar()">
                <div class="profile-avatar-mobile" id="sidebarProfileAvatar">T</div>
                <div class="profile-info-mobile">
                    <div class="profile-name-mobile" id="sidebarProfileName">Teacher</div>
                    <div class="profile-role-mobile">View Profile →</div>
                </div>
            </a>
            <button class="sidebar-close-mobile" onclick="closeSidebar()">✕</button>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-label">Main</div>
                    <a href="teacher_dashboard.html" class="nav-item">
                        <span class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="7" height="7" rx="1" />
                                <rect x="14" y="3" width="7" height="7" rx="1" />
                                <rect x="14" y="14" width="7" height="7" rx="1" />
                                <rect x="3" y="14" width="7" height="7" rx="1" />
                            </svg>
                        </span>
                        <span>Dashboard</span>
                    </a>
                </div>
                <div class="nav-section">
                    <div class="nav-label">Academic</div>
                    <a href="enter_marks.html" class="nav-item">
                        <span class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 11l3 3L22 4" />
                                <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
                            </svg>
                        </span>
                        <span>Enter Marks</span>
                    </a>
                    <a href="take_attendance.html" class="nav-item">
                        <span class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2" />
                                <path d="M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                                <path d="M9 14l2 2 4-4" />
                            </svg>
                        </span>
                        <span>Take Attendance</span>
                    </a>
                </div>
                <div class="nav-section">
                    <div class="nav-label">Management</div>
                    <a href="view_students.html" class="nav-item">
                        <span class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
                                <circle cx="9" cy="7" r="4" />
                                <path d="M23 21v-2a4 4 0 00-3-3.87" />
                                <path d="M16 3.13a4 4 0 010 7.75" />
                            </svg>
                        </span>
                        <span>View Students</span>
                    </a>
                </div>
                <a href="profile.html" class="sidebar-user">
                    <div class="user-avatar" id="sidebarAvatar">T</div>
                    <div class="user-info">
                        <div class="user-name" id="sidebarName">Teacher</div>
                        <div class="user-role" id="sidebarDesignation">Teacher</div>
                    </div>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logout()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                        <path d="M16 17l5-5-5-5" />
                        <path d="M21 12H9" />
                    </svg>
                    Sign Out
                </button>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Mobile Header -->
            <header class="mobile-header">
                <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="Menu">
                    <span></span><span></span><span></span>
                </button>
                <div class="mobile-brand">
                    <span>Profile</span>
                </div>
                <div style="width: 36px; height: 36px;"></div>
            </header>

            <!-- Desktop Topbar -->
            <div class="desktop-topbar">
                <div class="page-title">
                    <h1>My Profile</h1>
                </div>
            </div>

            <!-- Page Content -->
            <div class="page-content">
                <div class="profile-container">
                    <div class="profile-layout">
                        <!-- Left Column -->
                        <div class="profile-sidebar">
                            <div class="profile-header">
                                <div class="profile-avatar-large" id="profileAvatar">
                                    <span id="profileInitials">T</span>
                                    <div class="profile-avatar-edit"
                                        onclick="document.getElementById('imageInput').click()">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path
                                                d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                                            <path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                                        </svg>
                                    </div>
                                </div>
                                <input type="file" id="imageInput" class="upload-input" accept="image/*"
                                    onchange="handleImageUpload(this)">
                                <div class="profile-name-large" id="profileName">Teacher</div>
                                <div class="profile-role-large" id="profileRole">Teacher</div>
                            </div>
                        </div>

                        <!-- Right Column -->
                        <div class="profile-main">
                            <div class="info-card">
                                <h3>Personal Information</h3>
                                <div class="info-row">
                                    <span class="info-label">Full Name</span>
                                    <span class="info-value" id="infoName">-</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Username</span>
                                    <span class="info-value" id="infoUsername">-</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Designation</span>
                                    <span class="info-value" id="infoRole">-</span>
                                </div>
                            </div>

                            <div class="info-card" style="margin-top: 1rem;">
                                <h3>Security</h3>
                                <button class="btn btn-primary btn-change-password" onclick="showChangePassword()">
                                    Change Password
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="passwordModal" class="modal" style="display: none;">
        <div class="modal-overlay" onclick="closePasswordModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Change Password</h3>
                <button class="modal-close" onclick="closePasswordModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Current Password</label>
                    <input type="password" id="currentPassword" class="form-input" placeholder="Enter current password">
                </div>
                <div class="form-group" style="margin-top: 1rem;">
                    <label class="form-label">New Password</label>
                    <input type="password" id="newPassword" class="form-input" placeholder="Enter new password">
                </div>
                <div class="form-group" style="margin-top: 1rem;">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm new password">
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;" onclick="updatePassword()">
                    Update Password
                </button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        /* ── Sidebar toggle ── */
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('sidebarOverlay');
            const btn = document.getElementById('hamburgerBtn');
            sb.classList.toggle('open');
            ov.classList.toggle('active');
            btn.classList.toggle('active');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
            document.getElementById('hamburgerBtn').classList.remove('active');
        }

        /* ── Session guard ── */
        const teacher = getSession('teacher');
        if (!teacher) window.location.href = 'index.html';

        /* ── Populate Profile ── */
        const initials = teacher?.name?.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase() || 'T';

        // Large profile avatar
        const profileAvatar = document.getElementById('profileAvatar');
        const profileInitials = document.getElementById('profileInitials');
        if (teacher?.image_url) {
            profileAvatar.innerHTML = `
                <img src="${teacher.image_url}" alt="${teacher.name}">
                <div class="profile-avatar-edit" onclick="document.getElementById('imageInput').click()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        <path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </div>
            `;
        } else {
            profileInitials.textContent = initials;
        }

        // Text info
        document.getElementById('profileName').textContent = teacher.name;
        document.getElementById('profileRole').textContent = teacher.designation || 'Teacher';
        document.getElementById('infoName').textContent = teacher.name;
        document.getElementById('infoUsername').textContent = teacher.username;
        document.getElementById('infoRole').textContent = teacher.designation || 'Teacher';
        document.getElementById('infoDate').textContent = new Date(teacher.created_at).toLocaleDateString('en-IN');

        // Sidebar avatars
        const sidebarAvatar = document.getElementById('sidebarAvatar');
        if (sidebarAvatar) {
            if (teacher?.image_url) {
                sidebarAvatar.innerHTML = `<img src="${teacher.image_url}" alt="${teacher.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
            } else {
                sidebarAvatar.textContent = initials;
            }
        }

        const sidebarProfileAvatar = document.getElementById('sidebarProfileAvatar');
        if (sidebarProfileAvatar) {
            if (teacher?.image_url) {
                sidebarProfileAvatar.innerHTML = `<img src="${teacher.image_url}" alt="${teacher.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
            } else {
                sidebarProfileAvatar.textContent = initials;
            }
        }

        document.getElementById('sidebarName').textContent = teacher.name;
        document.getElementById('sidebarDesignation').textContent = teacher.designation || 'Teacher';
        document.getElementById('sidebarProfileName').textContent = teacher.name;

        /* ── Image Upload ── */
        async function handleImageUpload(input) {
            if (!input.files || !input.files[0]) return;

            const file = input.files[0];

            // Validate file size (max 2MB)
            if (file.size > 2 * 1024 * 1024) {
                showToast('Image size must be less than 2MB');
                return;
            }

            try {
                const fileExt = file.name.split('.').pop();
                const fileName = `teacher_${teacher.id}_${Date.now()}.${fileExt}`;
                const filePath = `teacher-profiles/${fileName}`;

                // Show loading
                const editBtn = document.querySelector('.profile-avatar-edit');
                editBtn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;"></div>';

                // Upload to Supabase Storage
                const { error: uploadError } = await db.storage
                    .from('teacher-images')
                    .upload(filePath, file);

                if (uploadError) throw uploadError;

                // Get public URL
                const { data: { publicUrl } } = db.storage
                    .from('teacher-images')
                    .getPublicUrl(filePath);

                // Update database
                const { error: updateError } = await db
                    .from('teachers')
                    .update({ image_url: publicUrl })
                    .eq('id', teacher.id);

                if (updateError) throw updateError;

                // Update session
                teacher.image_url = publicUrl;
                setSession('teacher', teacher);

                // Refresh page to show new image
                location.reload();

            } catch (err) {
                console.error('Upload error:', err);
                showToast('Failed to upload image. Please try again.');
                location.reload();
            }
        }

        /* ── Password Change ── */
        function showChangePassword() {
            document.getElementById('passwordModal').style.display = 'block';
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').style.display = 'none';
            document.getElementById('currentPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }

        async function updatePassword() {
            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!current || !newPass || !confirm) {
                showToast('Please fill all fields');
                return;
            }

            if (newPass !== confirm) {
                showToast('New passwords do not match');
                return;
            }

            if (newPass.length < 6) {
                showToast('Password must be at least 6 characters');
                return;
            }

            try {
                // Verify current password
                const { data: verifyData, error: verifyError } = await db
                    .from('teachers')
                    .select('id')
                    .eq('id', teacher.id)
                    .eq('password', current)
                    .single();

                if (verifyError || !verifyData) {
                    showToast('Current password is incorrect');
                    return;
                }

                // Update password
                const { error: updateError } = await db
                    .from('teachers')
                    .update({ password: newPass })
                    .eq('id', teacher.id);

                if (updateError) throw updateError;

                showToast('Password updated successfully!');
                closePasswordModal();

            } catch (err) {
                console.error('Password update error:', err);
                showToast('Failed to update password');
            }
        }

        /* ── Logout ── */
        function logout() {
            clearSession();
            window.location.href = 'index.html';
        }
        /* ── Toast Notification ── */
        function showToast(message, type = 'success') {
            // Remove existing toast
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            // Create toast
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            // Show
            setTimeout(() => toast.classList.add('show'), 10);

            // Hide after 3 seconds
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>

</html>
