<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Homework - ZPHS Nagulapet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Consistent with student_dashboard styles */
        .homework-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .homework-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem;
            background: var(--white);
            border-radius: var(--r-lg);
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow-xs);
            transition: all 0.2s;
        }

        .homework-item:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
            transform: translateY(-2px);
        }

        .homework-info {
            flex: 1;
        }

        .homework-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .homework-meta {
            display: flex;
            gap: 0.75rem;
            font-size: 0.875rem;
            color: var(--gray-500);
            flex-wrap: wrap;
            align-items: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: var(--r-full);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-blue {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-green {
            background: var(--emerald-100);
            color: #065f46;
        }

        .badge-amber {
            background: var(--amber-100);
            color: #92400e;
        }

        .badge-gray {
            background: var(--gray-100);
            color: var(--gray-600);
        }

        .homework-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--r);
            border: 1px solid var(--gray-200);
            background: var(--white);
            color: var(--gray-500);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-icon:hover {
            background: var(--indigo-50);
            border-color: var(--indigo-200);
            color: var(--primary);
        }

        .btn-icon svg {
            width: 20px;
            height: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--gray-400);
            background: var(--white);
            border-radius: var(--r-lg);
            border: 1px solid var(--gray-200);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            opacity: 0.35;
        }

        .filter-card {
            background: var(--white);
            border-radius: var(--r-lg);
            border: 1px solid var(--gray-200);
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 0.5rem;
        }

        select {
            padding: 0.625rem 0.875rem;
            border: 1px solid var(--gray-200);
            border-radius: var(--r);
            font-size: 0.875rem;
            background: var(--white);
            color: var(--gray-900);
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            .homework-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .homework-actions {
                width: 100%;
                justify-content: flex-end;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            top: 2rem;
            right: 0rem;
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 10000;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-left: 4px solid #4f46e5;
            font-weight: 500;
            color: #1f2937;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            border-left-color: #10b981;
        }

        .toast.error {
            border-left-color: #ef4444;
        }

        /* Loading state */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: var(--gray-400);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 0.75rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

    <script src="config.js"></script>
    <script>
        /* ── Sidebar toggle ── */
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('sidebarOverlay');
            const btn = document.getElementById('hamburgerBtn');
            sb.classList.toggle('open');
            ov.classList.toggle('active');
            btn.classList.toggle('active');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
            document.getElementById('hamburgerBtn').classList.remove('active');
        }

        /* ── Session guard ── */
        const student = getSession('student');
        if (!student) window.location.href = 'index.html';

        /* ── Populate user info ── */
        const initials = student?.name?.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase() || 'S';

        // Desktop sidebar avatar
        const sidebarAvatar = document.getElementById('sidebarAvatar');
        if (sidebarAvatar) {
            if (student?.image_url) {
                sidebarAvatar.innerHTML = `<img src="${student.image_url}" alt="${student.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
            } else {
                sidebarAvatar.textContent = initials;
            }
        }

        // Mobile profile avatar
        const sidebarProfileAvatar = document.getElementById('sidebarProfileAvatar');
        if (sidebarProfileAvatar) {
            if (student?.image_url) {
                sidebarProfileAvatar.innerHTML = `<img src="${student.image_url}" alt="${student.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
            } else {
                sidebarProfileAvatar.textContent = initials;
            }
        }

        // Names
        const sidebarName = document.getElementById('sidebarName');
        if (sidebarName) sidebarName.textContent = student.name;

        const sidebarClass = document.getElementById('sidebarClass');
        if (sidebarClass) sidebarClass.textContent = `Class ${student.class_name || ''}`;

        const sidebarProfileName = document.getElementById('sidebarProfileName');
        if (sidebarProfileName) sidebarProfileName.textContent = student?.name?.split(' ')[0] || 'Student';

        /* ── Toast ── */
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        /* ── Load Subjects for Filter ── */
        async function loadSubjects() {
            const cls = student.class_name;
            const subjects = cls ? SUBJECTS_BY_CLASS[cls] : [];
            const filterSelect = document.getElementById('filterSubject');
            filterSelect.innerHTML = '<option value="">All Subjects</option>' +
                subjects.map(s => `<option value="${s}">${s}</option>`).join('');
        }

        /* ── Load Homework ── */
        async function loadHomework() {
            const container = document.getElementById('homeworkContainer');
            const filterSubject = document.getElementById('filterSubject').value;

            container.innerHTML = '<div class="loading-state"><div class="spinner"></div><span>Loading homework...</span></div>';

            try {
                let query = db.from('homework')
                    .select('*, subjects(subject_name)')
                    .eq('class_name', student.class_name)
                    .eq('section', student.section)
                    .order('created_at', { ascending: false });

                const { data, error } = await query;

                if (error) throw error;

                // Filter by subject if selected
                let homeworks = data || [];
                if (filterSubject) {
                    homeworks = homeworks.filter(hw => hw.subjects?.subject_name === filterSubject);
                }

                if (homeworks.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                            </svg>
                            <p>No homework assigned for your class yet.</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = homeworks.map(hw => {
                    const subjectName = hw.subjects?.subject_name || 'Unknown';
                    const dueDate = hw.due_date
                        ? new Date(hw.due_date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })
                        : 'No deadline';
                    const isOverdue = hw.due_date && new Date(hw.due_date) < new Date() && new Date(hw.due_date).toDateString() !== new Date().toDateString();

                    return `
                        <div class="homework-item">
                            <div class="homework-info">
                                <div class="homework-title">${hw.title} - ${new Date(hw.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
                                <div class="homework-meta">
                                    <span class="badge badge-green">${subjectName}</span>
                                    <span class="badge ${isOverdue ? 'badge-amber' : 'badge-blue'}">
                                        ${isOverdue ? 'Overdue: ' : 'Due: '}${dueDate}
                                    </span>
                                    <span class="badge badge-gray">Class ${hw.class_name}-${hw.section}</span>
                                </div>
                            </div>
                            <div class="homework-actions">
                                <a href="${hw.file_url}" target="_blank" class="btn-icon" title="View Homework">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                        <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                    </svg>
                                </a>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error('Error loading homework:', err);
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <p>Error loading homework. Please try again.</p>
                    </div>
                `;
                showToast('Error loading homework', 'error');
            }
        }

        // Initialize
        loadSubjects();
        loadHomework();
    </script>
