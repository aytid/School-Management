<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Students - School Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Page-specific styles matching teacher_dashboard */
        .page-header {
            margin-bottom: 1.5rem;
        }
        
        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.25rem;
        }
        
        .page-header p {
            color: var(--gray-500);
            font-size: 0.9375rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            border: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .stat-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.5rem;
        }

        .stat-icon.blue {
            background: #e0e7ff;
            color: var(--primary);
        }

        .stat-icon.green {
            background: #d1fae5;
            color: var(--success);
        }

        .stat-icon.orange {
            background: #fef3c7;
            color: var(--warning);
        }

        .stat-icon.purple {
            background: #ede9fe;
            color: #7c3aed;
        }

        .stat-icon.teal {
            background: #ccfbf1;
            color: #0f766e;
        }

        .stat-info h3 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--gray-900);
            line-height: 1;
            margin-bottom: 0.25rem;
        }

        .stat-info p {
            font-size: 0.875rem;
            color: var(--gray-500);
        }

        /* Filter Card */
        .filter-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--gray-200);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .filter-row {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .filter-count {
            font-size: 0.9rem;
            color: var(--gray-500);
            margin-left: auto;
            align-self: center;
        }

        /* Search Bar */
        .search-bar {
            position: relative;
            flex: 1;
            min-width: 200px;
        }

        .search-bar input {
            padding-left: 2.5rem;
            width: 100%;
        }

        .search-icon {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
        }

        /* Student Grid */
        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .student-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            border: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .student-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
            border-color: var(--primary-light);
        }

        .student-card-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .sc-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.2rem;
        }

        .sc-roll {
            font-size: 0.8rem;
            color: var(--gray-400);
        }

        .sc-class {
            margin-top: 0.4rem;
            display: flex;
            gap: 0.25rem;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 1rem;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--white);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--white);
            z-index: 1;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--gray-400);
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: var(--gray-100);
            color: var(--gray-900);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 0.875rem 0;
            border-bottom: 1px solid var(--gray-100);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: 0.875rem;
            color: var(--gray-500);
            font-weight: 500;
        }

        .detail-value {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--gray-900);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .detail-box {
            background: var(--gray-50);
            padding: 1rem;
            border-radius: var(--radius);
            text-align: center;
        }

        .detail-box-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--gray-900);
        }

        .detail-box-label {
            font-size: 0.75rem;
            color: var(--gray-500);
            margin-top: 0.25rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--gray-400);
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .filter-row {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-count {
                margin-left: 0;
                text-align: center;
            }

            .student-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .detail-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script src="config.js"></script>
    <script>
        // Toggle sidebar for mobile
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Toggle more menu
        function toggleMoreMenu() {
            document.getElementById('mobileMoreMenu')?.classList.toggle('active');
        }

        const teacher = getSession('teacher');
        if (!teacher) throw 'auth';
        
        document.getElementById('sidebarAvatar').textContent = teacher.name.charAt(0).toUpperCase();
        document.getElementById('sidebarName').textContent = teacher.name;

        let allStudents = [];

        async function loadStudents() {
            const { data } = await db.from('students').select('*').order('class_name').order('section').order('roll_number');
            allStudents = data || [];

            // Build class stat cards
            const classCounts = {};
            CLASSES.forEach(c => classCounts[c] = 0);
            allStudents.forEach(s => { if (classCounts[s.class_name] !== undefined) classCounts[s.class_name]++; });
            
            const colors = ['blue', 'green', 'orange', 'purple', 'teal'];
            
            document.getElementById('classStatCards').innerHTML = CLASSES.map((c, i) => `
                <div class="stat-card" onclick="filterByClass('${c}')">
                    <div class="stat-info">
                        <h3>${classCounts[c]}</h3>
                        <p>Class ${c} Students</p>
                    </div>
                </div>
            `).join('') + `
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>${allStudents.length}</h3>
                        <p>Total Students</p>
                    </div>
                </div>`;

            applyFilters();
        }

        function filterByClass(cls) {
            document.getElementById('filterClass').value = cls;
            applyFilters();
        }

        function applyFilters() {
            const cls = document.getElementById('filterClass').value;
            const sec = document.getElementById('filterSection').value;
            const q = document.getElementById('searchInput').value.toLowerCase().trim();

            const filtered = allStudents.filter(s =>
                (!cls || s.class_name === cls) &&
                (!sec || s.section === sec) &&
                (!q || s.name.toLowerCase().includes(q) || s.roll_number.toLowerCase().includes(q))
            );

            document.getElementById('filterCount').textContent = `Showing ${filtered.length} of ${allStudents.length} students`;

            if (filtered.length === 0) {
                document.getElementById('studentGrid').innerHTML = `
                    <div class="empty-state">
                        <svg class="icon-xl" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom: 1rem;">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="M21 21l-4.35-4.35"/>
                        </svg>
                        <p>No students match your filters</p>
                    </div>`;
                return;
            }

            document.getElementById('studentGrid').innerHTML = filtered.map(s => `
                <div class="student-card" onclick="openModal(${s.id})">
                    <div class="student-card-avatar">${s.name.charAt(0).toUpperCase()}</div>
                    <div>
                        <div class="sc-name">${s.name}</div>
                        <div class="sc-roll">Roll: ${s.roll_number}</div>
                        <div class="sc-class">
                            <span class="badge badge-purple">Class ${s.class_name}</span>
                            <span class="badge badge-blue">Section ${s.section}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function openModal(studentId) {
            const student = allStudents.find(s => s.id === studentId);
            if (!student) return;

            document.getElementById('modalName').textContent = student.name;
            document.getElementById('modalSubtitle').textContent = `Class ${student.class_name} – Section ${student.section} | Roll: ${student.roll_number}`;

            document.getElementById('modalBody').innerHTML = `
                <div class="detail-grid">
                    <div class="detail-box">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin: 0 auto 0.5rem; color: var(--primary);">
                            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                        </svg>
                        <div class="detail-box-value">–</div>
                        <div class="detail-box-label">Loading...</div>
                    </div>
                    <div class="detail-box">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin: 0 auto 0.5rem; color: var(--success);">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
                            <path d="M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                            <path d="M9 14l2 2 4-4"/>
                        </svg>
                        <div class="detail-box-value">–</div>
                        <div class="detail-box-label">Loading...</div>
                    </div>
                </div>
                <div class="loading" style="text-align: center; padding: 2rem;">Loading details...</div>
            `;
            
            document.getElementById('modal').classList.add('open');

            // Load marks & attendance
            const [marksRes, attRes] = await Promise.all([
                db.from('marks').select('*, subjects(subject_name)').eq('student_id', studentId),
                db.from('attendance').select('status').eq('student_id', studentId)
            ]);

            const marks = marksRes.data || [];
            const att = attRes.data || [];

            const attTotal = att.length;
            const attPresent = att.filter(a => a.status === 'Present').length;
            const attPct = attTotal > 0 ? ((attPresent / attTotal) * 100).toFixed(1) : 0;

            let avgPct = '–';
            if (marks.length > 0) {
                const total = marks.reduce((a, m) => a + (m.marks_obtained / m.max_marks * 100), 0);
                avgPct = (total / marks.length).toFixed(1) + '%';
            }

            document.getElementById('modalBody').innerHTML = `
                <div class="detail-grid">
                    <div class="detail-box">
                        <div class="detail-box-value">${avgPct}</div>
                        <div class="detail-box-label">Average Marks</div>
                    </div>
                    <div class="detail-box">
                        <div class="detail-box-value" style="color: ${attPct >= 75 ? 'var(--success)' : attPct >= 60 ? 'var(--warning)' : 'var(--danger)'}">${attPct}%</div>
                        <div class="detail-box-label">Attendance</div>
                    </div>
                </div>
                
                <div class="detail-row">
                    <span class="detail-label">Full Name</span>
                    <span class="detail-value">${student.name}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Roll Number</span>
                    <span class="detail-value">${student.roll_number}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Class</span>
                    <span class="detail-value">${student.class_name}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Section</span>
                    <span class="detail-value">${student.section}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Total Exams</span>
                    <span class="detail-value">${marks.length}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Days Present</span>
                    <span class="detail-value">${attPresent}/${attTotal}</span>
                </div>
                
                ${marks.length > 0 ? `
                <div style="margin-top: 1.5rem;">
                    <h4 style="font-size: 0.9rem; font-weight: 600; color: var(--gray-900); margin-bottom: 0.75rem;">Exam Results</h4>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Subject</th>
                                    <th>Exam</th>
                                    <th>Marks</th>
                                    <th>Grade</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${marks.map(m => {
                                    const g = calculateGrade(m.marks_obtained, m.max_marks);
                                    return `<tr>
                                        <td>${m.subjects?.subject_name || '–'}</td>
                                        <td><span class="badge badge-blue">${m.exam_type}</span></td>
                                        <td>${m.marks_obtained}/${m.max_marks}</td>
                                        <td><span class="grade-badge ${g.cls}">${g.grade}</span></td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>` : '<div style="margin-top: 1rem; color: var(--gray-400); font-size: 0.875rem; text-align: center;">No marks recorded yet</div>'}
            `;
        }

        function closeModal(e) {
            if (e.target === document.getElementById('modal')) {
                document.getElementById('modal').classList.remove('open');
            }
        }

        loadStudents();
    </script>
</body>
</html>
