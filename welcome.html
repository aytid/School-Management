<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZPHS Nagulapet - Grand Unveiling</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    
    <style>
        /* --- Base & Reset --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0a0a0a;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            color: #e6dfd5; 
        }

        .stage {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* --- Ambient Lighting --- */
        .gallery-spotlight {
            position: absolute;
            top: -20vh;
            left: 50%;
            transform: translateX(-50%);
            width: 150vw;
            height: 150vh;
            background: radial-gradient(ellipse at top, rgba(224, 203, 170, 0.15) 0%, rgba(10, 10, 10, 0) 70%);
            z-index: 25;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        /* --- Background Images Sequence --- */
        .background-sequence {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            background: #0a0a0a;
        }

        .school-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            opacity: 0;
            transform: scale(1.02);
            transition: opacity 2s ease-in-out;
            filter: brightness(0.85) contrast(1.1);
        }

        .school-image.active {
            opacity: 1;
            animation: luxuryPan 7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes luxuryPan {
            from { transform: scale(1.02) translateY(0); }
            to { transform: scale(1.08) translateY(-1%); }
        }

        /* --- Luxurious Crimson Curtains --- */
        .curtain {
            position: absolute;
            top: 0;
            width: 51vw; 
            height: 100vh;
            /* Rich Red Velvet/Silk simulation */
            background: 
                linear-gradient(to right, 
                    rgba(255,255,255,0.02) 0%, 
                    rgba(0,0,0,0.4) 12%, 
                    rgba(255,255,255,0.08) 25%, 
                    rgba(0,0,0,0.5) 45%, 
                    rgba(255,255,255,0.05) 65%, 
                    rgba(0,0,0,0.6) 85%,
                    rgba(255,255,255,0.03) 100%),
                #7a0000; /* Deep Crimson Base */
            background-size: 12vw 100%, 100% 100%;
            z-index: 20;
            box-shadow: 0 0 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,0,0,0.5);
            transition: transform 3.5s cubic-bezier(0.7, 0, 0.1, 1); 
        }

        .curtain-left { 
            left: 0; 
            transform-origin: left; 
            border-right: 2px solid #3a0000;
        }
        .curtain-right { 
            right: 0; 
            transform-origin: right; 
            border-left: 2px solid #3a0000;
        }

        .stage.open .curtain-left { transform: translateX(-102%); }
        .stage.open .curtain-right { transform: translateX(102%); }

        /* --- Confetti Canvas --- */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 40; /* High z-index to fall over curtains and background */
            pointer-events: none; /* Let clicks pass through */
        }

        /* --- The Unveiling Interface --- */
        .launch-overlay {
            position: absolute;
            z-index: 30;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .school-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4.5rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            text-align: center;
            margin-bottom: 25vh;
            color: #fcfbf9;
            text-shadow: 0 10px 40px rgba(0,0,0,0.9);
            transition: opacity 1.5s ease, transform 1.5s ease;
        }

        .school-title i { font-style: italic; color: #d1bfae; }

        /* --- Silk Ribbon --- */
        .ribbon-wrapper {
            position: absolute;
            top: 50%; left: 0;
            width: 100%; height: 40px;
            transform: translateY(-50%);
            display: flex;
            filter: drop-shadow(0 20px 20px rgba(0,0,0,0.6));
        }

        .ribbon-half {
            width: 50%; height: 100%;
            background: linear-gradient(to bottom, #a38d72 0%, #d1bfae 20%, #947e62 45%, #b0997e 75%, #756148 100%);
            transition: transform 1.8s cubic-bezier(0.5, 0, 0.1, 1), opacity 1.5s ease;
            position: relative;
        }

        .ribbon-half::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(to bottom, transparent, transparent 2px, rgba(0,0,0,0.05) 3px);
        }

        .ribbon-left { transform-origin: center left; border-right: 1px solid #fff; }
        .ribbon-right { transform-origin: center right; border-left: 1px solid #fff; }

        .ribbon-wrapper.cut .ribbon-left { transform: rotate(-10deg) translateY(120vh); opacity: 0; }
        .ribbon-wrapper.cut .ribbon-right { transform: rotate(10deg) translateY(120vh); opacity: 0; }

        /* Minimalist Unveil Button */
        .action-wrapper {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 35;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.5s ease;
        }

        .action-wrapper.hidden {
            opacity: 0;
            transform: translate(-50%, -40%) scale(0.9);
            pointer-events: none;
        }

        .cut-btn {
            background: #141517;
            color: #d1bfae;
            border: 1px solid #d1bfae;
            width: 80px; height: 80px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-style: italic;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .cut-btn:hover { 
            background: #d1bfae; 
            color: #141517;
            transform: scale(1.05); 
            box-shadow: 0 15px 40px rgba(209, 191, 174, 0.3);
        }

        /* --- Premium Live Badge --- */
        #live-badge {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease;
            width: 100%;
        }

        #live-badge.active { opacity: 1; }

        .live-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: #ffffff;
            margin-bottom: 2rem;
            text-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: #d1bfae; 
        }

        .pulse-dot {
            width: 8px; height: 8px;
            background-color: #d1bfae;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(209, 191, 174, 0.8);
            animation: softPulse 3s infinite ease-in-out;
        }

        @keyframes softPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* --- Mobile Adjustments --- */
        @media (max-width: 768px) {
            .school-title { font-size: 2.8rem; padding: 0 20px; line-height: 1.2; margin-bottom: 15vh; }
            .live-title { font-size: 2rem; }
            .ribbon-wrapper { height: 30px; }
            .cut-btn { width: 70px; height: 70px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="stage" id="stage">
        
        <div class="gallery-spotlight"></div>
        
        <canvas id="confetti-canvas"></canvas>

        <div class="background-sequence">
            <img id="img1" class="school-image" src="https://images.unsplash.com/photo-1541339907198-e08756dedf3f?auto=format&fit=crop&w=1600&q=80" alt="ZPHS Nagulapet 1">
            <img id="img2" class="school-image" src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=1600&q=80" alt="ZPHS Nagulapet 2">
            
            <div id="live-badge">
                <h2 class="live-title">The Digital Space is Open</h2>
                <div class="live-indicator">
                    <div class="pulse-dot"></div>
                    Project Live
                </div>
            </div>
        </div>

        <div class="curtain curtain-left"></div>
        <div class="curtain curtain-right"></div>

        <div class="launch-overlay">
            <h1 class="school-title" id="schoolTitle">ZPHS <i>Nagulapet</i></h1>
            
            <div class="ribbon-wrapper" id="ribbonWrapper">
                <div class="ribbon-half ribbon-left"></div>
                <div class="ribbon-half ribbon-right"></div>
            </div>

            <div class="action-wrapper" id="actionWrapper">
                <button id="cutBtn" class="cut-btn">Unveil</button>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cutBtn = document.getElementById('cutBtn');
            const actionWrapper = document.getElementById('actionWrapper');
            const ribbonWrapper = document.getElementById('ribbonWrapper');
            const stage = document.getElementById('stage');
            const schoolTitle = document.getElementById('schoolTitle');
            const img1 = document.getElementById('img1');
            const img2 = document.getElementById('img2');
            const liveBadge = document.getElementById('live-badge');

            // --- Confetti Logic ---
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];
            // Premium confetti colors: Gold, Champagne, White, Deep Red
            const colors = ['#d1bfae', '#fcfbf9', '#d4af37', '#a31c1c']; 

            class ConfettiParticle {
                constructor() {
                    this.x = canvas.width / 2;
                    this.y = canvas.height / 2 + 50; // Burst from center where button was
                    this.r = Math.random() * 6 + 4; // Size
                    this.dx = Math.random() * 25 - 12.5; // Horizontal spread
                    this.dy = Math.random() * -25 - 10; // Vertical burst upward
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.tilt = Math.floor(Math.random() * 10) - 10;
                    this.tiltAngleInc = (Math.random() * 0.07) + 0.05;
                    this.tiltAngle = 0;
                    this.gravity = 0.6; // How fast it falls
                }
                update() {
                    this.dy += this.gravity;
                    this.x += this.dx;
                    this.y += this.dy;
                    this.tiltAngle += this.tiltAngleInc;
                    this.tilt = Math.sin(this.tiltAngle) * 15;
                }
                draw() {
                    ctx.beginPath();
                    ctx.lineWidth = this.r;
                    ctx.strokeStyle = this.color;
                    ctx.moveTo(this.x + this.tilt + this.r, this.y);
                    ctx.lineTo(this.x + this.tilt, this.y + this.tilt + this.r);
                    ctx.stroke();
                }
            }

            function fireConfetti() {
                for (let i = 0; i < 200; i++) { // Generate 200 pieces
                    particles.push(new ConfettiParticle());
                }
                animateConfetti();
            }

            function animateConfetti() {
                requestAnimationFrame(animateConfetti);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                    // Remove if off screen
                    if (particles[i].y > canvas.height) {
                        particles.splice(i, 1);
                        i--;
                    }
                }
            }

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });


            // --- Main Sequence Logic ---
            cutBtn.addEventListener('click', () => {
                actionWrapper.classList.add('hidden');
                ribbonWrapper.classList.add('cut');
                
                schoolTitle.style.opacity = '0';
                schoolTitle.style.transform = 'translateY(-15px)';

                setTimeout(() => {
                    stage.classList.add('open');
                    
                    // Trigger confetti right as curtains open
                    fireConfetti();
                    
                    setTimeout(() => {
                        img1.classList.add('active');
                        
                        setTimeout(() => {
                            img1.style.opacity = '0'; 
                            img2.classList.add('active'); 
                            
                            setTimeout(() => {
                                img2.style.opacity = '0.2'; 
                                liveBadge.classList.add('active');
                                
                                setTimeout(() => {
                                    document.body.style.transition = "opacity 1.5s ease";
                                    document.body.style.opacity = "0";
                                    
                                    setTimeout(() => {
                                        window.location.href = 'index.html'; 
                                    }, 1500);
                                    
                                }, 3500); 
                                
                            }, 4500); 
                            
                        }, 4500); 

                    }, 1000); 

                }, 500); 
            });
        });
    </script>
</body>
</html>
